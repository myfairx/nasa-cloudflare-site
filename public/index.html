<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction - NS Land Consultant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #166534 0%, #15803d 100%);
        color: #fff;
        padding: 20px;
      }
      .container {
        text-align: center;
        max-width: 600px;
      }
      .logo {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: #fbbf24;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.125rem;
        opacity: 0.9;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .contact {
        background: rgba(255, 255, 255, 0.1);
        padding: 1.5rem;
        border-radius: 12px;
      }
      .contact p {
        margin-bottom: 0.5rem;
        font-size: 1rem;
      }
      .contact a {
        color: #fbbf24;
        text-decoration: none;
      }
      .contact a:hover {
        text-decoration: underline;
      }

  </head>
  <body>
